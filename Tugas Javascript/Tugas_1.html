<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas 1 Javascript - Menghitung Luas</title>
</head>
<body>

<h1>Hasil Perhitungan Luas Bangun Datar</h1>
<div id="hasil"></div>

<script>

    // ==========================
    // Fungsi menghitung luas persegi panjang
    // Rumus: panjang x lebar
    // ==========================
    function luasPersegiPanjang(panjang, lebar){
        return panjang * lebar;
    }


    // ==========================
    // Fungsi menghitung luas bujur sangkar
    // Rumus: sisi x sisi
    // ==========================
    function luasBujurSangkar(sisi){
        return sisi * sisi;
    }


    // ==========================
    // Fungsi menghitung luas segitiga
    // Rumus: 1/2 x alas x tinggi
    // ==========================
    function luasSegitiga(alas, tinggi){
        return 0.5 * alas * tinggi;
    }


    // Variabel input (bebas sesuai ketentuan)
    let panjang = 10;
    let lebar = 5;

    let sisi = 8;

    let alas = 12;
    let tinggi = 6;


    // Memanggil fungsi
    let hasilPersegiPanjang = luasPersegiPanjang(panjang, lebar);
    let hasilBujurSangkar = luasBujurSangkar(sisi);
    let hasilSegitiga = luasSegitiga(alas, tinggi);


    // Menampilkan hasil ke halaman
    document.getElementById("hasil").innerHTML = `
        <p>Luas Persegi Panjang = ${hasilPersegiPanjang}</p>
        <p>Luas Bujur Sangkar = ${hasilBujurSangkar}</p>
        <p>Luas Segitiga = ${hasilSegitiga}</p>
    `;


    // Menampilkan hasil ke console
    console.log("Luas Persegi Panjang:", hasilPersegiPanjang);
    console.log("Luas Bujur Sangkar:", hasilBujurSangkar);
    console.log("Luas Segitiga:", hasilSegitiga);

</script>

</body>
</html>
